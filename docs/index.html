<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zecevolucja - Dynamiczna Ontologia</title>
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>

<div id="container">
  <div id="graph"></div>

  <div id="panel">
    <h2 id="node-title">Wybierz węzeł</h2>
    <p id="node-description">Kliknij element grafu, aby zobaczyć opis.</p>

    <!-- P0: jawny status ładowania/błędu danych (graph.js tym steruje) -->
    <div id="status" role="status" aria-live="polite" style="margin-top:12px;">
      <div id="status-loading">Ładowanie danych…</div>
      <div id="status-error" style="display:none;">
        Błąd ładowania danych. Sprawdź <code>docs/data.json</code> oraz konsolę przeglądarki.
      </div>
    </div>

    <a id="node-link" href="#" target="_blank"></a>
    <!-- P1: sterowanie widokiem grafu (logika w graph.js w kolejnym commicie) -->
    <div id="view-controls">
      <button id="btn-reset-view" type="button">Reset widoku</button>
      <button id="btn-fit-view" type="button">Dopasuj (fit)</button>
    </div>
    <!-- P1 (krok 1): stały kontener na filtry (zamiast dynamicznego fixed div w JS) -->
    <hr style="border:0;border-top:1px solid #30363d;margin:16px 0;" />
    <h3 style="margin:0 0 8px 0;font-size:14px;color:#e6edf3;">Filtry</h3>
    <div id="filters"></div>
  </div>
</div>

<div id="overlay" class="hidden">
  <div id="overlay-content">
    <h2 id="overlay-title"></h2>
    <p id="overlay-description"></p>
    <a id="overlay-link" href="#" target="_blank"></a>
  </div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="graph.js"></script>

</body>
</html>
